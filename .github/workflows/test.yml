name: Test Pull Request

on:
  pull_request:
    branches: [ main ]

# Important: This workflow has READ-ONLY permissions. 
# It can't push changes back to the repo, making it safe for external contributors.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Validate Scripts
        run: |
          # Check for syntax errors in our main files
          node -c scripts/aggregate.js
          node -c api/contributors.js
          echo "✅ Syntax check passed!"
          
      - name: Dry-run Aggregation (Optional)
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          # We don't provide a token here to ensure the script doesn't try to push anything
          # and stays within public rate limits during testing.
        run: |
          # We check if the script at least starts correctly
          # (It might hit rate limits, but it shouldn't have syntax/logic crashes)
          node -c scripts/aggregate.js
